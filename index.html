<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QADAR — Watch Now</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a0c;
    --surface:   #111116;
    --border:    #1e1e28;
    --gold:      #c9a84c;
    --gold-dim:  #7a5e24;
    --text:      #e8e4d8;
    --muted:     #5a5650;
    --accent:    #e8c96a;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Grain overlay ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999;
    opacity: .6;
  }

  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 28px 48px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    letter-spacing: .25em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .logo span { font-style: italic; color: var(--accent); }
  .ep-badge {
    font-size: .7rem;
    letter-spacing: .2em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .ep-badge strong { color: var(--gold); font-weight: 400; }

  /* ── Main layout ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* ── Video wrapper ── */
  .video-wrap {
    position: relative;
    width: 100%;
    background: #000;
    border: 1px solid var(--border);
    overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 40px 80px rgba(0,0,0,.7), 0 0 0 1px var(--border);
    animation: fadeUp .6s ease both;
  }
  .video-wrap::before {
    content: '';
    display: block;
    padding-top: 56.25%;
  }
  video {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    background: #000;
  }

  /* Loading overlay */
  .vid-loader {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10,10,12,.9);
    gap: 16px;
    transition: opacity .4s;
  }
  .vid-loader.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  .loader-text {
    font-size: .65rem; letter-spacing: .2em;
    color: var(--muted); text-transform: uppercase;
  }

  /* ── Controls bar ── */
  .controls {
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-top: 24px;
    animation: fadeUp .6s .15s ease both;
  }

  .ctrl-btn {
    display: flex; align-items: center; gap: 10px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    letter-spacing: .15em;
    text-transform: uppercase;
    padding: 12px 22px;
    cursor: pointer;
    transition: border-color .2s, color .2s, background .2s;
    border-radius: 2px;
  }
  .ctrl-btn:hover:not(:disabled) {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,.06);
  }
  .ctrl-btn:disabled {
    opacity: .2; cursor: not-allowed;
  }
  .ctrl-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

  .ep-info {
    text-align: center;
    flex: 1;
  }
  .ep-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    color: var(--text);
    letter-spacing: .05em;
  }
  .ep-meta {
    font-size: .6rem;
    color: var(--muted);
    letter-spacing: .18em;
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* ── Episode strip ── */
  .ep-section {
    margin-top: 48px;
    animation: fadeUp .6s .3s ease both;
  }
  .section-label {
    font-size: .6rem;
    letter-spacing: .3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-label::after {
    content: ''; flex: 1;
    height: 1px; background: var(--border);
  }

  .ep-strip {
    display: flex; gap: 10px;
    overflow-x: auto;
    padding-bottom: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .ep-strip::-webkit-scrollbar { height: 3px; }
  .ep-strip::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .ep-pill {
    flex-shrink: 0;
    padding: 9px 18px;
    border: 1px solid var(--border);
    border-radius: 2px;
    font-family: 'DM Mono', monospace;
    font-size: .65rem;
    letter-spacing: .12em;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    text-transform: uppercase;
    transition: all .2s;
  }
  .ep-pill:hover { border-color: var(--gold-dim); color: var(--text); }
  .ep-pill.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(201,168,76,.08);
  }

  /* ── Decorative line ── */
  .deco {
    display: flex; align-items: center; gap: 16px;
    margin: 48px 0 32px;
    opacity: .3;
  }
  .deco::before, .deco::after {
    content: ''; flex: 1;
    height: 1px; background: var(--gold);
  }
  .deco-sym {
    font-family: 'Playfair Display', serif;
    font-size: .9rem; color: var(--gold);
  }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Error toast ── */
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1a0a0a; border: 1px solid #5a1a1a;
    color: #e8a0a0; font-size: .65rem; letter-spacing: .15em;
    padding: 12px 24px; border-radius: 2px;
    opacity: 0; transition: opacity .3s;
    pointer-events: none; z-index: 1000;
    text-transform: uppercase;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 600px) {
    header { padding: 20px 20px; }
    .logo { font-size: 1.4rem; }
    .controls { flex-direction: column; align-items: stretch; }
    .ep-info { order: -1; }
    .ctrl-btn { justify-content: center; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Q<span>a</span>dar</div>
  <div class="ep-badge">Now Playing — Episode <strong id="headerEp">1</strong></div>
</header>

<main>
  <!-- Video player -->
  <div class="video-wrap" id="videoWrap">
    <video id="player" controls playsinline></video>
    <div class="vid-loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-text">Loading stream…</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl-btn" id="prevBtn" onclick="changeEp(-1)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Prev
    </button>

    <div class="ep-info">
      <div class="ep-title" id="epTitle">Episode 1</div>
      <div class="ep-meta">قدر · Series</div>
    </div>

    <button class="ctrl-btn" id="nextBtn" onclick="changeEp(1)">
      Next
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <div class="deco"><span class="deco-sym">◈</span></div>

  <!-- Episode strip -->
  <div class="ep-section">
    <div class="section-label">All Episodes</div>
    <div class="ep-strip" id="epStrip"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const BASE    = 'https://fvideo6d.ddns.me:443/2vod5n/qadar-';
  const SUFFIX  = '.mp4/playlist.m3u8';
  const TOTAL   = 45;   // adjust to actual episode count

  let current = 1;
  let hls = null;

  // Build episode strip
  const strip = document.getElementById('epStrip');
  for (let i = 1; i <= TOTAL; i++) {
    const btn = document.createElement('button');
    btn.className = 'ep-pill' + (i === 1 ? ' active' : '');
    btn.textContent = `EP ${String(i).padStart(2, '0')}`;
    btn.dataset.ep = i;
    btn.onclick = () => loadEp(i);
    strip.appendChild(btn);
  }

  function url(ep) { return BASE + ep + SUFFIX; }

  function loadEp(ep) {
    current = ep;
    const src = url(ep);

    // Update UI
    document.getElementById('headerEp').textContent = ep;
    document.getElementById('epTitle').textContent = `Episode ${ep}`;
    document.getElementById('prevBtn').disabled = ep <= 1;
    document.getElementById('nextBtn').disabled = ep >= TOTAL;
    document.querySelectorAll('.ep-pill').forEach(b => {
      b.classList.toggle('active', +b.dataset.ep === ep);
    });

    // Scroll pill into view
    const activePill = strip.querySelector('.ep-pill.active');
    if (activePill) activePill.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });

    // Show loader
    showLoader(true);

    // HLS setup
    const video = document.getElementById('player');
    if (hls) { hls.destroy(); hls = null; }

    if (Hls.isSupported()) {
      hls = new Hls({ enableWorker: true, lowLatencyMode: false });
      hls.loadSource(src);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        showLoader(false);
        video.play().catch(() => {});
      });
      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          showLoader(false);
          showToast('Stream error — check your connection');
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      video.src = src;
      video.addEventListener('loadedmetadata', () => {
        showLoader(false);
        video.play().catch(() => {});
      }, { once: true });
    } else {
      showLoader(false);
      showToast('HLS not supported in this browser');
    }
  }

  function changeEp(delta) {
    const next = current + delta;
    if (next < 1 || next > TOTAL) return;
    loadEp(next);
  }

  function showLoader(visible) {
    document.getElementById('loader').classList.toggle('hidden', !visible);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  // Auto-advance when episode ends
  document.getElementById('player').addEventListener('ended', () => {
    if (current < TOTAL) loadEp(current + 1);
  });

  // Init
  loadEp(1);
</script>
</body>
</html>
